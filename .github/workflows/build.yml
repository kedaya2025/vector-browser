name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build unpacked directory
        run: npx electron-builder --win --dir

      - name: Zip unpacked directory
        shell: pwsh
        run: |
          Compress-Archive -Path "build\win-unpacked\*" -DestinationPath "build\VectorBrowser-${{ github.ref_name }}-win64.zip"

      - name: Build NSIS installer
        run: npx electron-builder --win nsis

      - name: Upload artifacts (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: build/
          retention-days: 3

      - name: Get version
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Vector Browser ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/VectorBrowser-*-win64.zip
            build/*Setup*.exe
