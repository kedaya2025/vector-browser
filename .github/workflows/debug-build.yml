name: Debug Build

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build with verbose output
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          npx electron-builder --win nsis 2>&1 | Tee-Object -FilePath build-output.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "BUILD FAILED with exit code $LASTEXITCODE"
          }

      - name: Show build output
        shell: pwsh
        run: |
          if (Test-Path build-output.txt) {
            Get-Content build-output.txt
          } else {
            Write-Host "No build output found"
          }

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            build-output.txt
            build/
          retention-days: 1
