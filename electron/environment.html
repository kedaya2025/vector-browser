<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector Browser - Environment</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e1e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', 'Hiragino Sans GB', 'WenQuanYi Micro Hei', sans-serif; line-height: 1.6; min-height: 100vh; }
a { color: #00FF81; text-decoration: none; }
a:hover { text-decoration: underline; }

.header { background: #1a1a1a; border-bottom: 1px solid #333; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { font-size: 20px; font-weight: 700; color: #00FF81; letter-spacing: 1px; }
.header-title { font-size: 14px; color: #888; }
.header-right { display: flex; align-items: center; gap: 16px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00FF81; display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.status-text { font-size: 12px; color: #888; }
.btn-refresh { background: transparent; border: 1px solid #00FF81; color: #00FF81; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.btn-refresh:hover { background: #00FF81; color: #1e1e1e; }

.container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }

.card { background: #252525; border: 1px solid #333; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
.card-header { background: #2a2a2a; padding: 12px 20px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
.card-header h2 { font-size: 14px; font-weight: 600; color: #00FF81; letter-spacing: 1px; }
.card-header .icon { font-size: 16px; }
.card-body { padding: 16px 20px; }

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; }
.grid-item { display: flex; flex-direction: column; gap: 4px; padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
.grid-item:last-child { border-bottom: none; }
.grid-item.full { grid-column: 1 / -1; }

.label { font-size: 11px; color: #666; letter-spacing: 0.5px; }
.value { font-size: 13px; color: #e0e0e0; word-break: break-all; font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', 'Courier New', monospace; }
.value.green { color: #00FF81; }
.value.configured { color: #aaa; }
.value.error { color: #ff6b6b; }
.value .tag { display: inline-block; background: #333; color: #00FF81; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin-left: 6px; }
.value .tag.mismatch { background: #3a1a1a; color: #ff6b6b; }
.value .tag.match { background: #1a3a1a; color: #00FF81; }

.footer { text-align: center; padding: 24px; color: #555; font-size: 12px; border-top: 1px solid #333; margin-top: 20px; }

.loading { display: flex; justify-content: center; align-items: center; height: 200px; color: #666; }
.loading .spinner { width: 24px; height: 24px; border: 2px solid #333; border-top-color: #00FF81; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-page { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; gap: 16px; }
.error-page h1 { color: #ff6b6b; font-size: 24px; }
.error-page p { color: #888; }

.ip-highlight { font-size: 24px; font-weight: 700; color: #00FF81; font-family: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', 'Courier New', monospace; letter-spacing: 2px; }
.ip-country { font-size: 14px; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<!-- SERVER_CONFIG_INJECT -->

<div id="app">
  <div class="header">
    <div class="header-left">
      <span class="logo">Vector Browser</span>
      <span class="header-title" id="headerTitle"></span>
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span class="status-text" id="statusText"></span>
      <button class="btn-refresh" onclick="location.reload()" id="btnRefresh"></button>
    </div>
  </div>

  <div class="container" id="content">
    <div class="loading"><div class="spinner"></div><span id="loadingText"></span></div>
  </div>

  <div class="footer"><span id="footerText"></span> &mdash; <span id="ts"></span></div>
</div>

<script>
// ============ i18n ============
const isZh = (navigator.language || '').startsWith('zh');

const I18N = {
  headerTitle: { zh: '环境检测', en: 'Environment Inspection' },
  loading: { zh: '加载中...', en: 'Loading...' },
  detecting: { zh: '检测环境中...', en: 'Detecting environment...' },
  footer: { zh: 'Vector Browser 环境信息页', en: 'Vector Browser Environment Page' },
  refresh: { zh: '刷新', en: 'Refresh' },
  invalidAccess: { zh: '访问无效', en: 'Invalid Access' },
  missingToken: { zh: '缺少配置 ID 或 Token', en: 'Missing profile ID or token' },
  configLabel: { zh: '配置: ', en: 'Config: ' },
  actualLabel: { zh: '实际: ', en: 'Actual: ' },
  match: { zh: '匹配', en: 'Match' },
  diff: { zh: '不同', en: 'Diff' },

  // Section titles
  s_ip: { zh: 'IP 信息', en: 'IP Information' },
  s_browser: { zh: '浏览器身份', en: 'Browser Identity' },
  s_screen: { zh: '屏幕显示', en: 'Screen & Display' },
  s_hardware: { zh: '硬件信息', en: 'Hardware' },
  s_privacy: { zh: '隐私安全', en: 'Privacy & Security' },
  s_fingerprint: { zh: '指纹噪声', en: 'Fingerprint Noise' },
  s_network: { zh: '网络', en: 'Network' },
  s_cookie: { zh: 'Cookie', en: 'Cookies' },
  s_profile: { zh: '配置信息', en: 'Profile Info' },

  // IP fields
  f_publicIp: { zh: '公网 IP', en: 'PUBLIC IP' },
  f_isp: { zh: '运营商', en: 'ISP' },
  f_org: { zh: '组织', en: 'Organization' },
  f_asn: { zh: 'ASN', en: 'ASN' },
  f_proxyConfig: { zh: '代理配置', en: 'Proxy Config' },
  f_configuredIp: { zh: '配置 IP', en: 'Configured IP' },
  detectingIp: { zh: '检测中...', en: 'Detecting...' },

  // Browser identity fields
  f_ua: { zh: 'User-Agent', en: 'User-Agent' },
  f_uaFullVersion: { zh: 'UA 完整版本', en: 'UA Full Version' },
  f_secChUa: { zh: 'Sec-CH-UA', en: 'Sec-CH-UA' },
  f_language: { zh: '语言', en: 'Language' },
  f_timezone: { zh: '时区', en: 'Timezone' },
  f_platform: { zh: '平台', en: 'Platform' },
  f_appVersion: { zh: '应用版本', en: 'App Version' },
  f_langsList: { zh: '语言列表', en: 'Languages List' },

  // Screen fields
  f_resolution: { zh: '分辨率', en: 'Resolution' },
  f_windowSize: { zh: '窗口大小', en: 'Window Size' },
  f_colorDepth: { zh: '色深', en: 'Color Depth' },
  f_pixelDepth: { zh: '像素深度', en: 'Pixel Depth' },
  f_dpr: { zh: '设备像素比', en: 'Device Pixel Ratio' },

  // Hardware fields
  f_cpuCores: { zh: 'CPU 核心', en: 'CPU Cores' },
  f_memory: { zh: '内存 (GB)', en: 'Memory (GB)' },
  f_gpuEnabled: { zh: 'GPU 启用', en: 'GPU Enabled' },
  f_webglVendor: { zh: 'WebGL 厂商', en: 'WebGL Vendor' },
  f_webglRenderer: { zh: 'WebGL 渲染器', en: 'WebGL Renderer' },
  f_deviceName: { zh: '设备名称', en: 'Device Name' },
  f_mac: { zh: 'MAC 地址', en: 'MAC Address' },
  f_webglVersion: { zh: 'WebGL 版本', en: 'WebGL Version' },
  f_glslVersion: { zh: 'GLSL 版本', en: 'GLSL Version' },

  // Privacy fields
  f_webrtc: { zh: 'WebRTC 策略', en: 'WebRTC Policy' },
  f_geolocation: { zh: '地理位置', en: 'Geolocation' },
  f_dnt: { zh: '请勿追踪', en: 'Do Not Track' },
  f_coordinates: { zh: '坐标', en: 'Coordinates' },
  f_cookiesEnabled: { zh: 'Cookie 启用', en: 'Cookies Enabled' },
  f_maxTouch: { zh: '最大触摸点', en: 'Max Touch Points' },

  // Fingerprint fields
  f_canvasNoise: { zh: 'Canvas 噪声', en: 'Canvas Noise' },
  f_webglImgNoise: { zh: 'WebGL 图像噪声', en: 'WebGL Image Noise' },
  f_audioNoise: { zh: '音频上下文噪声', en: 'Audio Context Noise' },
  f_rectsNoise: { zh: '矩形噪声', en: 'Client Rects Noise' },
  f_fonts: { zh: '字体', en: 'Fonts' },
  f_speechVoices: { zh: '语音合成', en: 'Speech Voices' },
  f_canvasFp: { zh: 'Canvas 指纹', en: 'Canvas Fingerprint' },
  f_audioFp: { zh: '音频指纹', en: 'Audio Fingerprint' },
  f_plugins: { zh: '插件', en: 'Plugins' },

  // Network fields
  f_ssl: { zh: 'SSL 指纹', en: 'SSL Fingerprints' },
  f_openPorts: { zh: '开放端口', en: 'Open Ports' },
  f_connType: { zh: '连接类型', en: 'Connection Type' },
  f_downlink: { zh: '下行速度 (Mbps)', en: 'Downlink (Mbps)' },
  f_rtt: { zh: 'RTT (ms)', en: 'RTT (ms)' },

  // Cookie fields
  f_cookieMode: { zh: 'Cookie 模式', en: 'Cookie Mode' },
  f_cookies: { zh: 'Cookie', en: 'Cookies' },

  // Profile fields
  f_profileId: { zh: '配置 ID', en: 'Profile ID' },
  f_profileName: { zh: '配置名称', en: 'Profile Name' },
  f_group: { zh: '分组', en: 'Group' },
  f_os: { zh: '操作系统', en: 'OS' },
  f_chromeVer: { zh: 'Chrome 版本', en: 'Chrome Version' },

  // Values
  v_yes: { zh: '是', en: 'Yes' },
  v_no: { zh: '否', en: 'No' },
  v_enabled: { zh: '已启用', en: 'Enabled' },
  v_disabled: { zh: '已禁用', en: 'Disabled' },
  v_custom: { zh: '自定义', en: 'Custom' },
  v_replace: { zh: '替换 (非代理)', en: 'Replace (Non-proxied)' },
  v_allow: { zh: '允许', en: 'Allow' },
  v_block: { zh: '阻止', en: 'Block' },
  v_ask: { zh: '询问', en: 'Ask' },
  v_none: { zh: '无', en: 'None' },
  v_na: { zh: '无', en: 'N/A' },
  v_fontsConfigured: { zh: ' 个字体已配置', en: ' fonts configured' },
  v_voices: { zh: ' 个语音', en: ' voices' },
  v_detected: { zh: ' 个已检测', en: ' detected' },
  v_disabledCount: { zh: ' 个已禁用', en: ' disabled' },
};

function t(key) { return I18N[key] ? I18N[key][isZh ? 'zh' : 'en'] : key; }

// ============ DOM Helpers ============
const CFG = window.__SERVER_CONFIG__ || {};
const API_BASE = `http://127.0.0.1:${CFG.serverPort || 25252}`;
const API_URL = `${API_BASE}/api/environment?id=${CFG.profileId}&token=${CFG.token}`;

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  });
  children.forEach(c => {
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else if (c) e.appendChild(c);
  });
  return e;
}

function field(label, configVal, actualVal, opts = {}) {
  const item = el('div', { className: 'grid-item' + (opts.full ? ' full' : '') });
  item.appendChild(el('span', { className: 'label' }, label));

  if (configVal !== undefined && configVal !== null && configVal !== '') {
    const cv = el('span', { className: 'value configured' });
    cv.appendChild(document.createTextNode(t('configLabel')));
    cv.appendChild(document.createTextNode(formatVal(configVal)));
    item.appendChild(cv);
  }

  if (actualVal !== undefined && actualVal !== null && actualVal !== '') {
    const av = el('span', { className: 'value green' });
    av.appendChild(document.createTextNode(t('actualLabel')));
    av.appendChild(document.createTextNode(formatVal(actualVal)));
    if (configVal !== undefined && configVal !== null && configVal !== '') {
      const match = String(configVal) === String(actualVal);
      av.appendChild(el('span', { className: 'tag ' + (match ? 'match' : 'mismatch') }, match ? t('match') : t('diff')));
    }
    item.appendChild(av);
  } else if (configVal === undefined || configVal === null || configVal === '') {
    item.appendChild(el('span', { className: 'value' }, '-'));
  }

  return item;
}

function formatVal(v) {
  if (v === null || v === undefined) return '-';
  if (typeof v === 'object') return JSON.stringify(v);
  return String(v);
}

function section(title, icon, items) {
  const card = el('div', { className: 'card' });
  const header = el('div', { className: 'card-header' });
  header.appendChild(el('span', { className: 'icon' }, icon));
  header.appendChild(el('h2', {}, title));
  card.appendChild(header);
  const body = el('div', { className: 'card-body' });
  const grid = el('div', { className: 'grid' });
  items.forEach(i => grid.appendChild(i));
  body.appendChild(grid);
  card.appendChild(body);
  return card;
}

// ============ Data Fetching ============
async function fetchConfig() {
  try {
    const resp = await fetch(API_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error('Failed to fetch config:', e);
    return null;
  }
}

async function detectActual() {
  const d = {};
  d.userAgent = navigator.userAgent;
  d.platform = navigator.platform;
  d.appVersion = navigator.appVersion;
  d.language = navigator.language;
  d.languages = navigator.languages ? navigator.languages.join(', ') : '';
  d.cookieEnabled = navigator.cookieEnabled;
  d.doNotTrack = navigator.doNotTrack;
  d.maxTouchPoints = navigator.maxTouchPoints;
  d.screenWidth = screen.width;
  d.screenHeight = screen.height;
  d.screenColorDepth = screen.colorDepth;
  d.screenPixelDepth = screen.pixelDepth;
  d.windowWidth = window.innerWidth;
  d.windowHeight = window.innerHeight;
  d.devicePixelRatio = window.devicePixelRatio;
  d.cpuCores = navigator.hardwareConcurrency;
  d.deviceMemory = navigator.deviceMemory;
  if (navigator.connection) {
    d.connectionType = navigator.connection.effectiveType;
    d.downlink = navigator.connection.downlink;
    d.rtt = navigator.connection.rtt;
  }
  try { d.timezone = Intl.DateTimeFormat().resolvedOptions().timeZone; d.timezoneOffset = new Date().getTimezoneOffset(); } catch(e) {}
  try {
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
    if (gl) {
      const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
      if (debugInfo) {
        d.webglVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
        d.webglRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
      }
      d.webglVersion = gl.getParameter(gl.VERSION);
      d.webglSLVersion = gl.getParameter(gl.SHADING_LANGUAGE_VERSION);
    }
  } catch(e) {}
  try {
    const canvas = document.createElement('canvas');
    canvas.width = 200; canvas.height = 50;
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top'; ctx.font = '14px Arial'; ctx.fillStyle = '#f60';
    ctx.fillRect(125, 1, 62, 20); ctx.fillStyle = '#069';
    ctx.fillText('VectorBrowser', 2, 15); ctx.fillStyle = 'rgba(102,204,0,0.7)';
    ctx.fillText('VectorBrowser', 4, 17);
    d.canvasFingerprint = canvas.toDataURL().slice(-50);
  } catch(e) {}
  try {
    const ac = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 44100, 44100);
    const osc = ac.createOscillator(); osc.type = 'triangle';
    osc.frequency.setValueAtTime(10000, ac.currentTime);
    const comp = ac.createDynamicsCompressor(); osc.connect(comp); comp.connect(ac.destination);
    osc.start(0); const buffer = await ac.startRendering();
    const data = buffer.getChannelData(0); let sum = 0;
    for (let i = 4500; i < 5000; i++) sum += Math.abs(data[i]);
    d.audioFingerprint = sum.toFixed(6);
  } catch(e) {}
  try { d.speechVoices = speechSynthesis.getVoices().length; } catch(e) { d.speechVoices = 0; }
  d.plugins = navigator.plugins ? navigator.plugins.length : 0;
  try { d.geolocation = navigator.geolocation ? (isZh ? '可用' : 'available') : (isZh ? '不可用' : 'not available'); } catch(e) {}
  try { d.webrtc = (window.RTCPeerConnection || window.webkitRTCPeerConnection) ? (isZh ? '可用' : 'available') : (isZh ? '不可用' : 'not available'); } catch(e) {}
  try {
    const sources = [
      { url: 'http://ip-api.com/json/?fields=query,country,regionName,city,isp,org,as', parse: r => ({ ip: r.query, country: r.country, region: r.regionName, city: r.city, isp: r.isp, org: r.org, asn: r.as }) },
      { url: 'https://ipapi.co/json/', parse: r => ({ ip: r.ip, country: r.country_name, region: r.region, city: r.city, isp: r.org, org: r.org, asn: r.asn }) },
      { url: 'https://ipwho.is/', parse: r => ({ ip: r.ip, country: r.country, region: r.region, city: r.city, isp: r.connection?.isp, org: r.connection?.org, asn: r.connection?.asn }) }
    ];
    for (const src of sources) {
      try {
        const resp = await fetch(src.url, { signal: AbortSignal.timeout(5000) });
        if (resp.ok) { const data = await resp.json(); const parsed = src.parse(data); if (parsed.ip) { d.externalIp = parsed; break; } }
      } catch(e) { continue; }
    }
  } catch(e) {}
  return d;
}

// ============ Render ============
function render(config, actual) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const sections = [];

  // 1. IP
  const ipItems = [];
  if (actual.externalIp) {
    ipItems.push(el('div', { className: 'grid-item full' },
      el('span', { className: 'label' }, t('f_publicIp')),
      el('span', { className: 'ip-highlight' }, actual.externalIp.ip),
      el('span', { className: 'ip-country' }, [actual.externalIp.country, actual.externalIp.region, actual.externalIp.city].filter(Boolean).join(' / '))
    ));
    if (actual.externalIp.isp) ipItems.push(field(t('f_isp'), null, actual.externalIp.isp));
    if (actual.externalIp.org) ipItems.push(field(t('f_org'), null, actual.externalIp.org));
    if (actual.externalIp.asn) ipItems.push(field(t('f_asn'), null, actual.externalIp.asn));
  } else {
    ipItems.push(el('div', { className: 'grid-item full' },
      el('span', { className: 'label' }, t('f_publicIp')),
      el('span', { className: 'value error' }, t('detectingIp'))
    ));
  }
  if (config) {
    if (config.proxy && config.proxy.host) ipItems.push(field(t('f_proxyConfig'), `${config.proxy.protocol || 'HTTP'}://${config.proxy.host}:${config.proxy.port}`, null));
    if (config.ipInfo && config.ipInfo.ip) ipItems.push(field(t('f_configuredIp'), config.ipInfo.ip + ' (' + (config.ipInfo.country || '') + ')', null));
  }
  sections.push(section(t('s_ip'), '\u{1F310}', ipItems));

  // 2. Browser Identity
  const idItems = [];
  if (config) {
    idItems.push(field(t('f_ua'), config.ua?.value || '', actual.userAgent, { full: true }));
    idItems.push(field(t('f_uaFullVersion'), config.uaFullVersion?.value || '', ''));
    if (config.secChUa?.value) { idItems.push(field(t('f_secChUa'), config.secChUa.value.map(b => `${b.brand} v${b.version}`).join(', '), '')); }
    idItems.push(field(t('f_language'), config.uaLanguage?.value || '', actual.language));
    if (config.timeZone) idItems.push(field(t('f_timezone'), config.timeZone.name || config.timeZone.zone || '', actual.timezone));
  } else {
    idItems.push(field(t('f_ua'), '', actual.userAgent, { full: true }));
    idItems.push(field(t('f_language'), '', actual.language));
    idItems.push(field(t('f_timezone'), '', actual.timezone));
  }
  idItems.push(field(t('f_platform'), '', actual.platform));
  idItems.push(field(t('f_appVersion'), '', actual.appVersion, { full: true }));
  idItems.push(field(t('f_langsList'), '', actual.languages));
  sections.push(section(t('s_browser'), '\u{1F9F2}', idItems));

  // 3. Screen
  const screenItems = [];
  if (config && config.screen) {
    screenItems.push(field(t('f_resolution'), config.screen._value || `${config.screen.width}x${config.screen.height}`, `${actual.screenWidth}x${actual.screenHeight}`));
  } else {
    screenItems.push(field(t('f_resolution'), '', `${actual.screenWidth}x${actual.screenHeight}`));
  }
  screenItems.push(field(t('f_windowSize'), '', `${actual.windowWidth}x${actual.windowHeight}`));
  screenItems.push(field(t('f_colorDepth'), '', actual.screenColorDepth));
  screenItems.push(field(t('f_pixelDepth'), '', actual.screenPixelDepth));
  screenItems.push(field(t('f_dpr'), '', actual.devicePixelRatio));
  sections.push(section(t('s_screen'), '\u{1F5A5}', screenItems));

  // 4. Hardware
  const hwItems = [];
  if (config) {
    hwItems.push(field(t('f_cpuCores'), config.cpu?.value || '', actual.cpuCores));
    hwItems.push(field(t('f_memory'), config.memory?.value || '', actual.deviceMemory));
    hwItems.push(field(t('f_gpuEnabled'), config.gpu?.value === 1 ? t('v_yes') : t('v_no'), ''));
    hwItems.push(field(t('f_webglVendor'), config.webgl?.vendor || '', actual.webglVendor));
    hwItems.push(field(t('f_webglRenderer'), config.webgl?.render || '', actual.webglRenderer));
    hwItems.push(field(t('f_deviceName'), config.deviceName?.value || '', '', { full: true }));
    hwItems.push(field(t('f_mac'), config.mac?.value || '', '', { full: true }));
  } else {
    hwItems.push(field(t('f_cpuCores'), '', actual.cpuCores));
    hwItems.push(field(t('f_memory'), '', actual.deviceMemory));
    hwItems.push(field(t('f_webglVendor'), '', actual.webglVendor));
    hwItems.push(field(t('f_webglRenderer'), '', actual.webglRenderer));
  }
  hwItems.push(field(t('f_webglVersion'), '', actual.webglVersion));
  hwItems.push(field(t('f_glslVersion'), '', actual.webglSLVersion));
  sections.push(section(t('s_hardware'), '\u{1F4BB}', hwItems));

  // 5. Privacy
  const privItems = [];
  if (config) {
    const webrtcModes = { 0: t('v_replace'), 1: t('v_allow'), 2: t('v_block') };
    privItems.push(field(t('f_webrtc'), webrtcModes[config.webrtc?.mode] || '', actual.webrtc));
    const geoModes = { 0: t('v_ask'), 1: t('v_allow'), 2: t('v_block') };
    privItems.push(field(t('f_geolocation'), geoModes[config.location?.enable] || '', actual.geolocation));
    privItems.push(field(t('f_dnt'), config.dnt?.value === 1 ? t('v_enabled') : t('v_disabled'), actual.doNotTrack === '1' ? t('v_enabled') : actual.doNotTrack === '0' ? t('v_disabled') : actual.doNotTrack || ''));
    if (config.location && config.location.latitude && config.location.longitude) privItems.push(field(t('f_coordinates'), `${config.location.latitude}, ${config.location.longitude}`, ''));
  } else {
    privItems.push(field(t('f_webrtc'), '', actual.webrtc));
    privItems.push(field(t('f_geolocation'), '', actual.geolocation));
    privItems.push(field(t('f_dnt'), '', actual.doNotTrack));
  }
  privItems.push(field(t('f_cookiesEnabled'), '', actual.cookieEnabled));
  privItems.push(field(t('f_maxTouch'), '', actual.maxTouchPoints));
  sections.push(section(t('s_privacy'), '\u{1F512}', privItems));

  // 6. Fingerprint
  const fpItems = [];
  if (config) {
    if (config.canvas) { const c = config.canvas; fpItems.push(field(t('f_canvasNoise'), `R:${c.r} G:${c.g} B:${c.b} A:${c.a}`, actual.canvasFingerprint, { full: true })); }
    if (config.webglImage) { const w = config.webglImage; fpItems.push(field(t('f_webglImgNoise'), `R:${w.r} G:${w.g} B:${w.b} A:${w.a}`, '')); }
    if (config.audioContext) { const a = config.audioContext; fpItems.push(field(t('f_audioNoise'), `Channel:${a.channel} Analyser:${a.analyer}`, actual.audioFingerprint)); }
    if (config.clientRects) { const cr = config.clientRects; fpItems.push(field(t('f_rectsNoise'), `W:${cr.width} H:${cr.height}`, '')); }
    if (config.fonts?.value) fpItems.push(field(t('f_fonts'), config.fonts.value.length + t('v_fontsConfigured'), ''));
    if (config.speechVoices?.value) fpItems.push(field(t('f_speechVoices'), config.speechVoices.value.length + t('v_voices'), actual.speechVoices + t('v_detected')));
  } else {
    fpItems.push(field(t('f_canvasFp'), '', actual.canvasFingerprint, { full: true }));
    fpItems.push(field(t('f_audioFp'), '', actual.audioFingerprint));
    fpItems.push(field(t('f_speechVoices'), '', actual.speechVoices));
  }
  fpItems.push(field(t('f_plugins'), '', actual.plugins));
  sections.push(section(t('s_fingerprint'), '\u{1F3A8}', fpItems));

  // 7. Network
  const netItems = [];
  if (config) {
    if (config.ssl?.value) netItems.push(field(t('f_ssl'), config.ssl.value.length + t('v_disabledCount'), ''));
    if (config.portScan?.value) netItems.push(field(t('f_openPorts'), config.portScan.value.join(', ') || t('v_none'), ''));
  }
  netItems.push(field(t('f_connType'), '', actual.connectionType || t('v_na')));
  netItems.push(field(t('f_downlink'), '', actual.downlink || t('v_na')));
  netItems.push(field(t('f_rtt'), '', actual.rtt || t('v_na')));
  sections.push(section(t('s_network'), '\u{1F310}', netItems));

  // 8. Cookies
  const cookieItems = [];
  if (config && config.cookie) {
    cookieItems.push(field(t('f_cookieMode'), config.cookie.mode === 1 ? t('v_custom') : t('v_disabled'), '', { full: true }));
    if (config.cookie.value && Array.isArray(config.cookie.value)) {
      cookieItems.push(field(t('f_cookies'), config.cookie.value.map(c => `${c.name}=${c.value} (${c.domain})`).join('\n') || t('v_none'), document.cookie || t('v_none'), { full: true }));
    }
  } else {
    cookieItems.push(field(t('f_cookies'), '', document.cookie || t('v_none'), { full: true }));
  }
  sections.push(section(t('s_cookie'), '\u{1F36A}', cookieItems));

  // 9. Profile
  if (config) {
    const profItems = [];
    profItems.push(field(t('f_profileId'), config.id, ''));
    profItems.push(field(t('f_profileName'), config.name, ''));
    profItems.push(field(t('f_group'), config.group || '', ''));
    profItems.push(field(t('f_os'), config.os || '', ''));
    profItems.push(field(t('f_chromeVer'), config.chromeVersion || '', ''));
    sections.push(section(t('s_profile'), '\u{1F464}', profItems));
  }

  sections.forEach(s => content.appendChild(s));
  document.getElementById('statusText').textContent = `${isZh ? '配置' : 'Profile'} #${CFG.profileId || '?'} | ${isZh ? '端口' : 'Port'} ${CFG.serverPort || '?'}`;
  document.getElementById('ts').textContent = new Date().toLocaleString();
}

// ============ Init ============
async function init() {
  document.getElementById('headerTitle').textContent = t('headerTitle');
  document.getElementById('loadingText').textContent = t('detecting');
  document.getElementById('btnRefresh').textContent = t('refresh');
  document.getElementById('footerText').textContent = t('footer');

  if (!CFG.profileId || !CFG.token) {
    document.getElementById('content').innerHTML = `<div class="error-page"><h1>${t('invalidAccess')}</h1><p>${t('missingToken')}</p></div>`;
    return;
  }
  const [config, actual] = await Promise.all([fetchConfig(), detectActual()]);
  render(config, actual);
}

init();
</script>
</body>
</html>
